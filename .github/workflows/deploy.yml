name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Branch-based Pages deploy: pushing the built site to the gh-pages branch.
# GitHub auto-enables Pages for a gh-pages branch, so this needs no manual
# Settings -> Pages step (the Actions-source method requires one and its
# auto-enablement is blocked for this token).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
